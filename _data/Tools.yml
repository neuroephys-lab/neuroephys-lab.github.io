- title: neoDBS
  image: /img/tools/neoDBS_2.png" alt="neoBDS"
  imageLink: https://www.neuro-ephys.org/NeoDBS-Documentation/
  description: "neoDBS is a free open-source user-oriented Python-based toolbox for offline data visualization, processing, and  feature extraction from Percept™ PC/RC + BrainSense™ intracranial patient recordings for electrophysiolgical biomarker discovery. The novel toolbox addresses limitations of previously developed tools   and includes batch processing of multiple recording sessions, event-locked analysis for chronic and in-clinic data, and automatic  feature extraction, in an intuitive browser-like interface with predefined pipelines for users lacking signal processing skills. You can find all information on our [pre-print](https://www.biorxiv.org/content/10.64898/2026.03.27.714691v1.full), on [github](https://github.com/neuroephys-lab/NeoDBS), and on the [documentation wiki](https://www.neuro-ephys.org/NeoDBS-Documentation/).

